<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Mnemonic Zen</title>
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/nolan/180/brain.png">
    <link rel="icon" type="image/png" href="https://img.icons8.com/nolan/64/brain.png">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="trigger-zone" onclick="toggleMenu()"></div>

    <div class="top-bar" id="topBar">
        <div class="icon-btn" onclick="toggleMode()"><span>Тип</span><div class="icon" id="iconMode">🔢</div></div>
        <div class="icon-btn" onclick="toggleUnique()"><span>Режим</span><div class="icon" id="iconUnique">♾️</div></div>
        <div class="icon-btn" onclick="toggleAuto()"><span>Авто</span><div class="icon" id="iconAuto">▶️</div></div>
        <div class="icon-btn" onclick="toggleSound()"><span>Звук</span><div class="icon" id="iconSound">🔇</div></div>
        <div class="icon-btn" onclick="openSettings()"><span>Настр.</span><div class="icon">⚙️</div></div>
    </div>

    <div class="main-stage" id="stage" onclick="handleStageClick()">
        <div id="displayData" class="start-text">СТАРТ</div>
        <img id="displayImg" src="" alt="Card">
    </div>
    
    <div class="status" id="status"></div>
    <div class="history-strip" id="history"></div>
    
    <button class="verify-btn" id="btnVerify" onclick="openRecall()">👁️ Проверить себя</button>

    <div class="modal" id="modalSettings">
        <div class="modal-content">
            <div class="modal-title">Настройки Тренажера</div>
            
            <div class="setting-group" id="setNumbers">
                <h3>🔢 Числа</h3>
                <div class="flex-row">
                    <span>От:</span> <input type="number" id="inpMin" value="0">
                    <span>До:</span> <input type="number" id="inpMax" value="99">
                </div>
            </div>

            <div class="setting-group" id="setCards" style="display:none;">
                <h3>🃏 Карты</h3>
                <div class="flex-row">
                    <label class="checkbox-label"><input type="checkbox" id="cS" checked> ♠</label>
                    <label class="checkbox-label"><input type="checkbox" id="cH" checked> ♥</label>
                    <label class="checkbox-label"><input type="checkbox" id="cD" checked> ♦</label>
                    <label class="checkbox-label"><input type="checkbox" id="cC" checked> ♣</label>
                </div>
                <div class="flex-row" style="margin-top: 5px;">
                    <label class="checkbox-label"><input type="checkbox" id="rLow" checked> 2-5</label>
                    <label class="checkbox-label"><input type="checkbox" id="rMid" checked> 6-10</label>
                    <label class="checkbox-label"><input type="checkbox" id="rHigh" checked> Фигуры</label>
                </div>
            </div>

            <div class="setting-group">
                <h3>🖥 Интерфейс</h3>
                <label class="checkbox-label" style="justify-content: space-between; margin-bottom: 5px;">
                    <span>Показывать историю (снизу)</span>
                    <input type="checkbox" id="chkHistory" checked onchange="updateUIPreferences()">
                </label>
                <label class="checkbox-label" style="justify-content: space-between;">
                    <span>Кнопка «Проверить» всегда на экране</span>
                    <input type="checkbox" id="chkVerify" checked onchange="updateUIPreferences()">
                </label>
            </div>

            <div class="setting-group">
                <h3>⏱ Скорость (Авто)</h3>
                <div class="flex-row"><input type="number" id="inpTimer" value="3.0" step="0.5"> сек</div>
            </div>

            <button class="btn-close" onclick="closeSettings()">Применить и Начать</button>
        </div>
    </div>

    <div class="modal" id="modalRecall">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-title">Дворец Памяти</div>
            <p style="font-size: 0.8rem; color: var(--text-dim); text-align: center; margin-top: -10px;">Тапай по карточкам, чтобы открыть</p>
            <div class="recall-grid" id="recallGrid"></div>
            <div class="action-row">
                <button class="action-btn" onclick="revealAll()">Открыть всё</button>
                <button class="action-btn" style="background:var(--primary); color:#000;" onclick="exportData()">Скопировать</button>
            </div>
            <button class="btn-close" style="background:#333; color:white; margin-top:15px;" onclick="closeRecall()">Закрыть</button>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
